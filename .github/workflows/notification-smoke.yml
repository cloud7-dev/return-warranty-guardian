name: Notification Smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      provider:
        description: "Notification provider: ntfy or gotify"
        required: true
        default: "ntfy"
        type: choice
        options:
          - ntfy
          - gotify
      endpoint:
        description: "Self-hosted endpoint base URL"
        required: true
        type: string
      topic:
        description: "ntfy topic; ignored for Gotify"
        required: false
        default: "returns"
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Public endpoint smoke
        id: public-smoke
        if: ${{ github.event_name == 'workflow_dispatch' || vars.RWG_NOTIFY_PUBLIC_ENDPOINT != '' }}
        env:
          RWG_NOTIFY_PUBLIC_SMOKE: "1"
          RWG_NOTIFY_PUBLIC_PROVIDER: ${{ inputs.provider || vars.RWG_NOTIFY_PUBLIC_PROVIDER || 'ntfy' }}
          RWG_NOTIFY_PUBLIC_ENDPOINT: ${{ inputs.endpoint || vars.RWG_NOTIFY_PUBLIC_ENDPOINT }}
          RWG_NOTIFY_PUBLIC_TOPIC: ${{ inputs.topic || vars.RWG_NOTIFY_PUBLIC_TOPIC || 'returns' }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/rwg-notification-smoke/raw" "$RUNNER_TEMP/rwg-notification-smoke/records"
          npm --silent run notify:smoke > "$RUNNER_TEMP/rwg-notification-smoke/raw/raw-smoke.json"
          npm --silent run notify:record -- "$RUNNER_TEMP/rwg-notification-smoke/raw/raw-smoke.json" > "$RUNNER_TEMP/rwg-notification-smoke/records/sanitized-smoke-record.json"
          npm --silent run notify:validate-record -- "$RUNNER_TEMP/rwg-notification-smoke/records/sanitized-smoke-record.json"
          npm --silent run notify:ops-report -- "$RUNNER_TEMP/rwg-notification-smoke/records" > "$RUNNER_TEMP/rwg-notification-smoke/records/ops-report.md"

      - name: Upload sanitized smoke record
        if: ${{ steps.public-smoke.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: sanitized-notification-smoke-record
          path: |
            ${{ runner.temp }}/rwg-notification-smoke/records/sanitized-smoke-record.json
            ${{ runner.temp }}/rwg-notification-smoke/records/ops-report.md
          if-no-files-found: error
          retention-days: 30

      - name: Skip notice
        if: ${{ github.event_name == 'schedule' && vars.RWG_NOTIFY_PUBLIC_ENDPOINT == '' }}
        run: echo "Skipping scheduled public endpoint smoke because RWG_NOTIFY_PUBLIC_ENDPOINT is not configured."
