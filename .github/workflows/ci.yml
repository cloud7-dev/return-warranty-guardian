name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check
        run: node --check src/*.js && node --check scripts/*.mjs && node --check tests/*.mjs

      - name: Test
        run: npm test

      - name: Notification smoke test
        run: npm run notify:smoke

      - name: Static build check
        run: npm run build
